# Production-only Docker setup.
# Development is expected to run locally without Docker.
services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env.prod
    volumes:
      - backend_data:/app/data
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3001:3001"
    restart: unless-stopped

volumes:
  backend_data:
